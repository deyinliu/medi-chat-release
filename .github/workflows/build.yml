name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动生成 vYYYY.MM.DD-HHMM）'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ── Cleanup old artifacts ──────────────────────────────
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: write
    steps:
      - name: Delete old artifacts to free quota
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ids=$(gh api --paginate repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[].id')
          if [ -n "$ids" ]; then
            echo "$ids" | while read id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id --silent
              echo "  deleted artifact $id"
            done
            echo "→ All old artifacts deleted"
          else
            echo "→ No old artifacts to delete"
          fi

  # ── Determine tag & create draft GitHub Release ────────
  init-release:
    needs: cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "TAG=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=v$(date +%Y.%m.%d)-$(date +%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          # 删除已存在的同名 release（处理重跑场景）
          gh release delete "${{ steps.tag.outputs.TAG }}" -R "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${{ steps.tag.outputs.TAG }}" \
            -R "${{ github.repository }}" \
            --draft \
            --title "数据助手 ${{ steps.tag.outputs.TAG }}" \
            --notes "自动构建，macOS 双击 .dmg 安装，Windows 运行 .exe 安装。支持自动更新。"

  # ── macOS ──────────────────────────────────────────────
  build-mac:
    needs: [cleanup, init-release]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Clone source from private repo medi-chat
        uses: actions/checkout@v4
        with:
          repository: deyinliu/medi-chat
          token: ${{ secrets.MEDI_CHAT_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Python runtime
        uses: actions/cache@v4
        with:
          path: resources/python
          key: python-mac-${{ runner.arch }}-20260623-3.12.13-v3

      - name: Download macOS Python runtime
        run: |
          if [ -f resources/python/bin/python3 ]; then
            echo "→ Python cache hit, skipping download"
          else
            TAG=20260623
            PYTHON_VERSION=3.12.13
            RAW=$(uname -m)
            case "$RAW" in arm64) ARCH="aarch64" ;; *) ARCH="$RAW" ;; esac
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/${TAG}/cpython-${PYTHON_VERSION}+${TAG}-${ARCH}-apple-darwin-install_only.tar.gz"
            curl -fSL "$URL" -o python.tar.gz
            mkdir -p resources/python
            tar xzf python.tar.gz -C resources/python --strip-components=1
          fi
          resources/python/bin/python3 -m pip install duckdb scipy statsmodels seaborn

      - run: npm run build && npx electron-builder --mac --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          for f in release/*.dmg release/*.dmg.blockmap release/latest-mac.yml; do
            [ -f "$f" ] || { echo "→ skipping $f (not found)"; continue; }
            uploaded=false
            for i in 1 2 3; do
              echo "→ uploading $f (attempt $i)"
              if gh release upload "${{ needs.init-release.outputs.tag }}" "$f" \
                -R "${{ github.repository }}" --clobber; then
                uploaded=true
                break
              fi
              if [ $i -lt 3 ]; then
                echo "  upload failed, retrying in 10s..."
                sleep 10
              fi
            done
            if [ "$uploaded" = false ]; then
              echo "FAILED to upload $f after 3 attempts"
              exit 1
            fi
          done

  # ── Windows ────────────────────────────────────────────
  build-win:
    needs: [cleanup, init-release]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Clone source from private repo medi-chat
        uses: actions/checkout@v4
        with:
          repository: deyinliu/medi-chat
          token: ${{ secrets.MEDI_CHAT_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Python runtime
        uses: actions/cache@v4
        with:
          path: resources/python
          key: python-win-x64-20260623-3.12.13-v3

      - name: Download Windows Python runtime
        shell: bash
        run: |
          if [ -f resources/python/python.exe ]; then
            echo "→ Python cache hit, skipping download"
          else
            TAG=20260623
            PYTHON_VERSION=3.12.13
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/${TAG}/cpython-${PYTHON_VERSION}+${TAG}-x86_64-pc-windows-msvc-install_only.tar.gz"
            curl -fSL "$URL" -o python.tar.gz
            mkdir -p resources/python
            tar xzf python.tar.gz -C resources/python --strip-components=1
          fi
          ls resources/python/python.exe
          resources/python/python.exe -m pip install duckdb scipy statsmodels seaborn

      - run: npm run build && npx electron-builder --win --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          for f in release/*.exe release/latest.yml; do
            [ -f "$f" ] || { echo "→ skipping $f (not found)"; continue; }
            uploaded=false
            for i in 1 2 3; do
              echo "→ uploading $f (attempt $i)"
              if gh release upload "${{ needs.init-release.outputs.tag }}" "$f" \
                -R "${{ github.repository }}" --clobber; then
                uploaded=true
                break
              fi
              if [ $i -lt 3 ]; then
                echo "  upload failed, retrying in 10s..."
                sleep 10
              fi
            done
            if [ "$uploaded" = false ]; then
              echo "FAILED to upload $f after 3 attempts"
              exit 1
            fi
          done

  # ── Publish draft release after both platforms built ──
  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          gh release edit "${{ needs.init-release.outputs.tag }}" -R "${{ github.repository }}" --draft=false
