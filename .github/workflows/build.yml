name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动生成 vYYYY.MM.DD-HHMM）'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ── Cleanup old artifacts ──────────────────────────────
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      actions: write
    steps:
      - name: Delete old artifacts to free quota
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ids=$(gh api --paginate repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[].id')
          if [ -n "$ids" ]; then
            echo "$ids" | while read id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id --silent
              echo "  deleted artifact $id"
            done
            echo "→ All old artifacts deleted"
          else
            echo "→ No old artifacts to delete"
          fi

  # ── Create draft release first ─────────────────────────
  init-release:
    needs: cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.TAG }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "TAG=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=v$(date +%Y.%m.%d)-$(date +%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          gh release delete "${{ steps.version.outputs.TAG }}" \
            -R "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true

          gh release create "${{ steps.version.outputs.TAG }}" \
            -R "${{ github.repository }}" \
            --draft \
            --title "数据助手 ${{ steps.version.outputs.TAG }}" \
            --notes "自动构建，macOS 双击 .dmg 安装，Windows 运行 .exe 安装。支持自动更新。"

  # ── macOS ──────────────────────────────────────────────
  build-mac:
    needs: [cleanup, init-release]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Clone source from private repo medi-chat
        uses: actions/checkout@v4
        with:
          repository: deyinliu/medi-chat
          token: ${{ secrets.MEDI_CHAT_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Python runtime
        uses: actions/cache@v4
        with:
          path: resources/python
          key: python-mac-${{ runner.arch }}-20260623-3.12.13-v4

      - name: Download macOS Python runtime
        run: |
          if [ -f resources/python/bin/python3 ]; then
            echo "→ Python cache hit, skipping download"
          else
            TAG=20260623
            PYTHON_VERSION=3.12.13
            RAW=$(uname -m)
            case "$RAW" in arm64) ARCH="aarch64" ;; *) ARCH="$RAW" ;; esac
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/${TAG}/cpython-${PYTHON_VERSION}+${TAG}-${ARCH}-apple-darwin-install_only.tar.gz"
            curl -fSL "$URL" -o python.tar.gz
            mkdir -p resources/python
            tar xzf python.tar.gz -C resources/python --strip-components=1
          fi
          # Isolate from host machine: pyvenv.cfg disables user site-packages,
          # --no-user overrides any global pip config that sets user=true.
          # This ensures all packages are installed inside resources/python/,
          # not leaked from the CI runner's ~/.local.
          cat > resources/python/pyvenv.cfg <<'PYEOF'
          include-system-site-packages = false
          PYEOF
          resources/python/bin/python3 -m pip install --no-user duckdb scipy statsmodels seaborn

      - run: npm run electron:build -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          for f in release/*.dmg release/*.dmg.blockmap release/latest-mac.yml; do
            [ -f "$f" ] || continue
            echo "→ uploading $f"
            gh release upload "${{ needs.init-release.outputs.tag }}" "$f" \
              -R "${{ github.repository }}" --clobber
          done

  # ── Windows ────────────────────────────────────────────
  build-win:
    needs: [cleanup, init-release]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Clone source from private repo medi-chat
        uses: actions/checkout@v4
        with:
          repository: deyinliu/medi-chat
          token: ${{ secrets.MEDI_CHAT_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Python runtime
        uses: actions/cache@v4
        with:
          path: resources/python
          key: python-win-x64-20260623-3.12.13-v4

      - name: Download Windows Python runtime
        shell: bash
        run: |
          if [ -f resources/python/python.exe ]; then
            echo "→ Python cache hit, skipping download"
          else
            TAG=20260623
            PYTHON_VERSION=3.12.13
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/${TAG}/cpython-${PYTHON_VERSION}+${TAG}-x86_64-pc-windows-msvc-install_only.tar.gz"
            curl -fSL "$URL" -o python.tar.gz
            mkdir -p resources/python
            tar xzf python.tar.gz -C resources/python --strip-components=1
          fi
          ls resources/python/python.exe
          # Isolate from host: pyvenv.cfg disables user site-packages,
          # --no-user overrides any global pip config.
          echo "include-system-site-packages = false" > resources/python/pyvenv.cfg
          resources/python/python.exe -m pip install --no-user duckdb scipy statsmodels seaborn

      - run: npm run electron:build:win -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          for f in release/*.exe release/latest.yml; do
            [ -f "$f" ] || continue
            echo "→ uploading $f"
            gh release upload "${{ needs.init-release.outputs.tag }}" "$f" \
              -R "${{ github.repository }}" --clobber
          done

  # ── All builds done → publish or delete draft ──────────
  finalize:
    needs: [init-release, build-mac, build-win]
    if: ${{ always() && needs.init-release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    steps:
      - name: Publish release
        if: ${{ needs.build-mac.result == 'success' && needs.build-win.result == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          echo "→ Both builds passed, publishing release"
          gh release edit "${{ needs.init-release.outputs.tag }}" \
            -R "${{ github.repository }}" --draft=false

      - name: Delete draft on failure
        if: ${{ needs.build-mac.result != 'success' || needs.build-win.result != 'success' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          echo "→ Build failed, deleting draft release"
          gh release delete "${{ needs.init-release.outputs.tag }}" \
            -R "${{ github.repository }}" --yes --cleanup-tag
